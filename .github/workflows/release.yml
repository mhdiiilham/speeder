name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Build CLI binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-X main.version=${VERSION} -s -w"
          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "linux/arm"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${targets[@]}"; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            out="dist/speeder-${GOOS}-${GOARCH}"
            [ "$GOOS" = "windows" ] && out="${out}.exe"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags "$LDFLAGS" -o "$out" .
            echo "Built $out"
          done

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: dist/*

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-amd64
            build_tags: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build desktop app
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          wails build -ldflags "-X main.version=${VERSION} -s -w" -clean
          mkdir -p ../dist
          exe=$(find . -name "*.exe" -not -path "./frontend/*" | head -1)
          echo "Built binary: $exe"
          cp "$exe" "../dist/speeder-desktop-${{ matrix.label }}.exe"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: speeder-desktop-${{ matrix.label }}
          path: dist/speeder-desktop-${{ matrix.label }}*

  release:
    runs-on: ubuntu-latest
    needs: [cli, desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
